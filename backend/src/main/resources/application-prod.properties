# Production settings — PostgreSQL (e.g. Render-managed database)
#
# These values come from environment variables so no secrets are committed
# to the repo. Set them in your hosting platform's dashboard:
#
#   DATABASE_URL       e.g. jdbc:postgresql://host:5432/dbname
#   DATABASE_USERNAME   database username
#   DATABASE_PASSWORD   database password

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 console not relevant in production
spring.h2.console.enabled=false
