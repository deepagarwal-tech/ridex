spring.application.name=ridex

# Active profile: "local" (default, H2 file-based) or "prod" (PostgreSQL on Render).
# Render sets SPRING_PROFILES_ACTIVE=prod via environment variable; locally it
# falls back to "local" automatically if not set.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=${PORT:8080}
